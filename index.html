<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <!-- link for Roboto font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <img src="images/catlogo.jpg" alt="Cat Logo" width="50px">
        <div class="header-links">
            <a href="https://en.wikipedia.org/wiki/Cat">About cats</a>
            <a href="https://www.reddit.com/r/kittens/">Cute kitties</a>
            <a href="https://everycat.org">Donate for cats</a>
        </div>
    </div>
    <div class="hero">
        <div class="hero-text">
            <h1>Cats are awesome</h1>
            <p>Cats are cute, this website is dedicated to cats. I love how adorable cats look. Look at this one next to you, he's going to jump on you hiyaaaaaa.</p>
            <form action="images/hiyaaaaa.webp" method="get">
                <button>Cat button</button>
            </form>
        </div>
        <img src="images/hiyaaaaa.webp" alt="Cat jumps on you hiyaaaaa" width="600px" height="400px">
    </div>
</body>
</html>
